spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://localhost:5432/sepa_db
    username: sepa_user
    password: sepa_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update # For showcase, allows easy schema updates. In production, use 'validate' or 'none' with Flyway/Liquibase
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  kafka:
    producer:
      bootstrap-servers: localhost:9093 # Kafka broker running on host machine
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    properties:
      spring.json.add.type.headers: false # Do not add type headers for simplicity
      spring.json.trusted.packages: "com.example.sepa.common.event" # Trust our common event package

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/master # Keycloak issuer URI
          jwk-set-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}/protocol/openid-connect/certs

# Custom properties
app:
  kafka:
    topics:
      payment-initiated: payment.initiated

---
# Profile for local development without security
spring:
  config:
    activate:
      on-profile: dev
  security:
    oauth2:
      resourceserver:
        jwt:
          # Disable JWT validation for dev profile
          # This is a simplification for local development and should NOT be used in production
          issuer-uri: http://localhost:9000/realms/mock-realm # Use a non-existent issuer to effectively disable
          jwk-set-uri: http://localhost:9000/realms/mock-realm/protocol/openid-connect/certs