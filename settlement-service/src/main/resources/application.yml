spring:
  application:
    name: settlement-service
  kafka:
    consumer:
      bootstrap-servers: localhost:9093 # Kafka broker running on host machine
      group-id: settlement-service-group # Unique consumer group ID
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.value.default.type: com.example.sepa.common.event.PaymentInitiatedEvent # Default type for JSON deserialization
        spring.json.trusted.packages: "com.example.sepa.common.event" # Trust our common event package
    producer: # Settlement service will also produce events (e.g., PaymentStatusEvent)
      bootstrap-servers: localhost:9093
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      ack-mode: RECORD # Acknowledge each record individually
      # Error handling for consumers (ADR-009)
      # This configuration enables a DefaultErrorHandler with retries and a DeadLetterPublishingRecoverer
      # For simplicity, we'll configure a basic retry here. Full DLQ setup can be more complex.
      common-error-handler:
        retry-listeners: true # Enable retry listeners for logging
        max-attempts: 3 # Max attempts including the first one
        back-off:
          delay: 1000 # Initial delay of 1 second
          max-delay: 10000 # Max delay of 10 seconds
          multiplier: 2.0 # Exponential back-off

# Custom properties
app:
  kafka:
    topics:
      payment-initiated: payment.initiated
      payment-status: payment.status # Topic for publishing payment status events